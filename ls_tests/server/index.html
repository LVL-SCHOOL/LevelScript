<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawScript HTTP Сервер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 90%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0a0b8;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-card {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #8888a0;
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .endpoints {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: left;
        }

        .endpoints h3 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .endpoint {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        .method {
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .method.get {
            background: #10b981;
            color: #ffffff;
        }

        .method.post {
            background: #f59e0b;
            color: #ffffff;
        }

        .path {
            color: #c4c4d8;
            font-size: 0.95rem;
        }

        .footer {
            margin-top: 2rem;
            color: #6666aa;
            font-size: 0.85rem;
        }

        .footer span {
            color: #f093fb;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            animation: float 6s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-100px) rotate(180deg);
                opacity: 0.1;
            }
        }

        @media (max-width: 600px) {
            .status-card {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8rem;
            }

            .container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Плавающие частицы -->
    <div class="particles">
        <div class="particle" style="width: 10px; height: 10px; left: 10%; top: 20%; animation-delay: 0s;"></div>
        <div class="particle" style="width: 15px; height: 15px; left: 25%; top: 60%; animation-delay: 1s;"></div>
        <div class="particle" style="width: 8px; height: 8px; left: 50%; top: 30%; animation-delay: 2s;"></div>
        <div class="particle" style="width: 12px; height: 12px; left: 70%; top: 50%; animation-delay: 3s;"></div>
        <div class="particle" style="width: 6px; height: 6px; left: 85%; top: 15%; animation-delay: 4s;"></div>
        <div class="particle" style="width: 14px; height: 14px; left: 40%; top: 80%; animation-delay: 5s;"></div>
        <div class="particle" style="width: 9px; height: 9px; left: 15%; top: 70%; animation-delay: 0.5s;"></div>
        <div class="particle" style="width: 11px; height: 11px; left: 90%; top: 40%; animation-delay: 1.5s;"></div>
    </div>

    <div class="container">
        <div class="logo">🦾</div>
        <h1>LawScript Server</h1>
        <p class="subtitle">Самописный HTTP-сервер работает!</p>

        <div class="status-card">
            <div class="stat-item">
                <span class="stat-value">200</span>
                <span class="stat-label">Статус</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">100%</span>
                <span class="stat-label">Аптайм</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">642</span>
                <span class="stat-label">RPS</span>
            </div>
        </div>

        <div class="endpoints">
            <h3>📡 Доступные эндпоинты</h3>
            <div class="endpoint">
                <span class="method get">GET</span>
                <span class="path">/hello</span>
            </div>
            <div class="endpoint">
                <span class="method post">POST</span>
                <span class="path">/hello</span>
            </div>
        </div>

        <div class="footer">
            Работает на <span>LawScript</span> • Порт <span>5050</span> • Локальный хост
        </div>
    </div>
</body>
</html>
